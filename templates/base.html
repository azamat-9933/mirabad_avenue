        @media (prefers-reduced-motion: reduce) {

                scroll-behavior: auto !important;

<body class="{% block body_class %}bg-surface text-on-surface antialiased{% endblock %}">
{% include "partials/sidebar.html" %}
{% include "partials/topbar.html" %}
<div class="mobile-sidebar-backdrop hidden" data-mobile-sidebar-backdrop></div>
{% include "partials/app_overlays.html" %}

<div class="toast-region" data-toast-region aria-live="polite" aria-atomic="true"></div>
<script>
(() => {
    const prefersReduced = window.matchMedia("(prefers-reduced-motion: reduce)").matches;

    if (document.fonts && document.fonts.load) {
        document.fonts.load('24px "Material Symbols Outlined"').then((faces) => {
            if (faces.length) {
                document.documentElement.classList.add("symbols-ready");
            }
        });
    } else {
        document.documentElement.classList.add("symbols-ready");
    }

    document.querySelectorAll("table").forEach((table) => table.classList.add("table-stable"));

    const barObserver = "IntersectionObserver" in window ? new IntersectionObserver((entries) => {
        entries.forEach((entry) => {
            if (entry.isIntersecting) {
                entry.target.classList.add("is-visible");
                barObserver.unobserve(entry.target);
            }
        });
    }, { threshold: 0.35 }) : null;
    document.querySelectorAll('div[class*="rounded-t-sm"]').forEach((bar) => {
        if (bar.style.height || /\bh-\[/.test(bar.className)) {
            bar.classList.add("chart-bar");
            if (barObserver && !prefersReduced) {
                barObserver.observe(bar);
            } else {
                bar.classList.add("is-visible");
            }
        }
    });

    const numberFormatter = (value, decimals, useGrouping) => value.toLocaleString("en-US", {
        minimumFractionDigits: decimals,
        maximumFractionDigits: decimals,
        useGrouping,
    });
    const countElements = document.querySelectorAll(".motion-stagger p, .motion-stagger h2, .motion-stagger h3");
    countElements.forEach((element) => {
        if (element.children.length) return;
        const original = element.textContent.trim();
        const match = original.match(/^([^\d-]*)(-?\d[\d,]*(?:\.\d+)?)(.*)$/);
        if (!match || prefersReduced) return;
        const [, prefix, rawNumber, suffix] = match;
        const target = Number(rawNumber.replace(/,/g, ""));
        if (!Number.isFinite(target)) return;
        const decimals = (rawNumber.split(".")[1] || "").length;
        const useGrouping = rawNumber.includes(",");
        const duration = 680;
        const start = performance.now();
        const tick = (now) => {
            if (element.dataset.statSynced === "true") return;
            const progress = Math.min((now - start) / duration, 1);
            const eased = 1 - Math.pow(1 - progress, 3);
            element.textContent = `${prefix}${numberFormatter(target * eased, decimals, useGrouping)}${suffix}`;
            if (progress < 1) requestAnimationFrame(tick);
        };
        requestAnimationFrame(tick);
    });

    const enhanceTable = (table) => {
        if (table.dataset.enhanced === "true") return;
        const headRow = table.querySelector("thead tr");
        const body = table.querySelector("tbody");
        if (!headRow || !body) return;
        table.dataset.enhanced = "true";

        const selectHead = document.createElement("th");
        selectHead.className = "px-4 py-4";
        selectHead.innerHTML = '<input aria-label="Select all rows" data-select-all type="checkbox">';
        headRow.prepend(selectHead);
        Array.from(body.rows).forEach((row) => {
            const cell = document.createElement("td");
            cell.className = "px-4 py-4";
            cell.innerHTML = '<input aria-label="Select row" data-row-select type="checkbox">';
            row.prepend(cell);
        });

        const rows = Array.from(body.rows);
        const host = table.closest(".overflow-x-auto") || table;
        host.classList.add("table-workspace");
        const tools = document.createElement("div");
        tools.className = "table-tools";
        tools.innerHTML = `
            <label class="table-search-shell">
                <span class="material-symbols-outlined" aria-hidden="true">search</span>
                <input class="table-search" aria-label="Search table" placeholder="Search inside table..." type="search">
            </label>
            <button class="table-tool-button" data-table-action="export" type="button">
                <span class="material-symbols-outlined" aria-hidden="true">upload</span>
                <span>Export</span>
            </button>
            <button class="table-tool-button" data-table-action="reminders" type="button">
                <span class="material-symbols-outlined" aria-hidden="true">notifications</span>
                <span>Send reminders</span>
            </button>
            <button class="table-tool-button" data-table-action="status" type="button">
                <span class="material-symbols-outlined" aria-hidden="true">sell</span>
                <span>Assign status</span>
            </button>
            <span class="table-selected-counter" data-selected-count data-count="0">0 selected</span>
        `;
        host.parentNode.insertBefore(tools, host);

        const pagination = document.createElement("div");
        pagination.className = "table-pagination";
        pagination.innerHTML = `
            <span class="text-xs font-bold text-on-surface-variant" data-page-label>Page 1</span>
            <div class="flex gap-2">
                <button class="table-tool-button" data-prev-page type="button">Previous</button>
                <button class="table-tool-button" data-next-page type="button">Next</button>
            </div>
        `;
        host.parentNode.insertBefore(pagination, host.nextSibling);

        let page = 1;
        const pageSize = 6;
        let filteredRows = rows;
        let skeletonTimer = null;
        const setTableLoading = () => {
            if (skeletonTimer) window.clearTimeout(skeletonTimer);
            host.classList.add("is-loading");
            skeletonTimer = window.setTimeout(() => host.classList.remove("is-loading"), 260);
        };
        const updateVisibleRows = () => {
            const maxPage = Math.max(1, Math.ceil(filteredRows.length / pageSize));
            page = Math.min(page, maxPage);
            rows.forEach((row) => row.classList.add("hidden"));
            filteredRows.slice((page - 1) * pageSize, page * pageSize).forEach((row) => row.classList.remove("hidden"));
            const pageLabel = pagination.querySelector("[data-page-label]");
            pageLabel.dataset.pageCurrent = page;
            pageLabel.dataset.pageTotal = maxPage;
            pageLabel.textContent = `Page ${page} of ${maxPage}`;
            window.HydroFlowSyncLocale?.();
        };
        const updateSelection = () => {
            const selected = table.querySelectorAll("[data-row-select]:checked").length;
            const selectedLabel = tools.querySelector("[data-selected-count]");
            selectedLabel.dataset.count = selected;
            selectedLabel.textContent = `${selected} selected`;
            window.HydroFlowSyncLocale?.();
        };
        const search = tools.querySelector(".table-search");
        search.addEventListener("input", () => {
            setTableLoading();
            const query = search.value.trim().toLowerCase();
            filteredRows = rows.filter((row) => row.dataset.globalFilterHidden !== "true" && row.textContent.toLowerCase().includes(query));
            page = 1;
            updateVisibleRows();
        });
        tools.querySelectorAll(".table-tool-button").forEach((button) => {
            button.addEventListener("click", () => {
                if (button.dataset.tableAction === "reminders") {
                    document.querySelector("[data-drawer-open='notifications-drawer']")?.click();
                }
            });
        });
        table.querySelector("[data-select-all]").addEventListener("change", (event) => {
            rows.forEach((row) => {
                const checkbox = row.querySelector("[data-row-select]");
                if (!row.classList.contains("hidden")) checkbox.checked = event.target.checked;
            });
            updateSelection();
        });
        table.querySelectorAll("[data-row-select]").forEach((checkbox) => checkbox.addEventListener("change", updateSelection));
        updateSelection();
        const semanticSortValue = (row, index, label) => {
            const labelKey = String(label || "").toLowerCase();
            const text = String(row.cells[index]?.textContent || "").trim();
            const key = text.toLowerCase();
            const datasetNumber = (name) => {
                const value = Number(row.dataset[name]);
                return Number.isFinite(value) ? { type: "number", value } : null;
            };
            const datasetText = (name) => row.dataset[name]
                ? { type: "text", value: String(row.dataset[name]).toLowerCase() }
                : null;
            if (row.classList.contains("residential-district-row") || row.classList.contains("residential-building-row")) {
                if (labelKey.includes("complex") || labelKey.includes("комплекс") || labelKey.includes("kompleks")) {
                    const value = datasetText("sortName");
                    if (value) return value;
                }
                if (labelKey.includes("infra") || labelKey.includes("инфра")) {
                    const value = datasetNumber("sortUnits") || datasetNumber("sortBuildings");
                    if (value) return value;
                }
                if (labelKey.includes("system") || labelKey.includes("систем") || labelKey.includes("tizim")) {
                    const value = datasetNumber("sortSystemRank") || datasetNumber("sortHealth");
                    if (value) return value;
                }
                if (labelKey.includes("finance") || labelKey.includes("фина") || labelKey.includes("moliya")) {
                    const value = datasetNumber("sortHealth") || datasetNumber("sortFinance");
                    if (value) return value;
                }
                if (labelKey.includes("debt") || labelKey.includes("долг") || labelKey.includes("qarz")) {
                    const value = datasetNumber("sortDebt");
                    if (value) return value;
                }
                if (labelKey.includes("action") || labelKey.includes("действ") || labelKey.includes("amal")) {
                    const value = datasetNumber("sortDebtors") || datasetNumber("sortPaid");
                    if (value) return value;
                }
            }
            if (labelKey.includes("priority") || labelKey.includes("приоритет") || labelKey.includes("ustuvor")) {
                const priority = row.dataset.priority || key;
                if (priority.includes("high") || priority.includes("высок") || priority.includes("yuqori")) return { type: "rank", value: 3 };
                if (priority.includes("medium") || priority.includes("сред") || priority.includes("o'rta")) return { type: "rank", value: 2 };
                if (priority.includes("low") || priority.includes("низ") || priority.includes("past")) return { type: "rank", value: 1 };
            }
            if (labelKey.includes("status") || labelKey.includes("статус") || labelKey.includes("holat")) {
                const status = row.dataset.statusKey || key;
                if (status.includes("critical") || status.includes("overdue") || status.includes("критич")) return { type: "rank", value: 5 };
                if (status.includes("progress") || status.includes("active") || status.includes("актив")) return { type: "rank", value: 4 };
                if (status.includes("pending") || status.includes("planned") || status.includes("warning") || status.includes("ожид")) return { type: "rank", value: 3 };
                if (status.includes("scheduled") || status.includes("upcoming") || status.includes("заплан")) return { type: "rank", value: 2 };
                if (status.includes("completed") || status.includes("success") || status.includes("paid") || status.includes("заверш")) return { type: "rank", value: 1 };
            }
            if (labelKey.includes("date") || labelKey.includes("time") || labelKey.includes("дата") || labelKey.includes("время")) {
                const [day, month, year] = text.split("|")[0].trim().split(".").map(Number);
                return { type: "date", value: new Date(year || 1970, (month || 1) - 1, day || 1).getTime() };
            }
            const numeric = Number(text.replace(/[^\d.-]/g, ""));
            if (Number.isFinite(numeric) && /\d/.test(text) && !/[a-zа-я]/i.test(text.replace(/uzs/ig, ""))) {
                return { type: "number", value: numeric };
            }
            return { type: "text", value: key };
        };
        const compareSemanticRows = (a, b, index, direction, label) => {
            const av = semanticSortValue(a, index, label);
            const bv = semanticSortValue(b, index, label);
            const result = av.type === "text" || bv.type === "text"
                ? String(av.value).localeCompare(String(bv.value), undefined, { numeric: true, sensitivity: "base" })
                : av.value - bv.value;
            return direction === "asc" ? result : -result;
        };
        Array.from(headRow.cells).forEach((header, index) => {
            if (index === 0) {
                header.classList.add("table-select-heading");
                return;
            }
            const label = header.textContent.trim();
            header.classList.add("table-filter-heading");
            header.setAttribute("role", "button");
            header.setAttribute("tabindex", "0");
            header.setAttribute("aria-label", `Filter and sort by ${label}`);
            header.innerHTML = `
                <span class="table-filter-heading-inner">
                    <span class="material-symbols-outlined table-filter-heading-icon" aria-hidden="true">filter_list</span>
                    <span class="table-filter-heading-text">${label}</span>
                    <span class="material-symbols-outlined table-sort-heading-icon" aria-hidden="true">unfold_more</span>
                </span>
            `;
            const applySort = () => {
                setTableLoading();
                const direction = header.dataset.sortDirection === "asc" ? "desc" : "asc";
                Array.from(headRow.cells).forEach((cell) => {
                    if (cell !== header) {
                        delete cell.dataset.sortDirection;
                        const icon = cell.querySelector(".table-sort-heading-icon");
                        if (icon) icon.textContent = "unfold_more";
                    }
                });
                header.dataset.sortDirection = direction;
                const icon = header.querySelector(".table-sort-heading-icon");
                if (icon) icon.textContent = direction === "asc" ? "arrow_upward" : "arrow_downward";
                rows.sort((a, b) => compareSemanticRows(a, b, index, direction, label));
                rows.forEach((row) => body.appendChild(row));
                filteredRows = rows.filter((row) => row.textContent.toLowerCase().includes(search.value.trim().toLowerCase()));
                updateVisibleRows();
            };
            header.addEventListener("click", applySort);
            header.addEventListener("keydown", (event) => {
                if (event.key === "Enter" || event.key === " ") {
                    event.preventDefault();
                    applySort();
                }
            });
        });
        pagination.querySelector("[data-prev-page]").addEventListener("click", () => {
            setTableLoading();
            page = Math.max(1, page - 1);
            updateVisibleRows();
        });
        pagination.querySelector("[data-next-page]").addEventListener("click", () => {
            setTableLoading();
            page += 1;
            updateVisibleRows();
        });
        updateVisibleRows();
    };
    document.querySelectorAll("table").forEach(enhanceTable);

    const setupCharts = () => {
        if (!window.Chart) return;
        const baseOptions = {
            responsive: true,
            maintainAspectRatio: false,
            plugins: {
                legend: { position: "bottom", labels: { boxWidth: 10, usePointStyle: true } },
                tooltip: {
                    backgroundColor: "#171c1f",
                    titleColor: "#ffffff",
                    bodyColor: "#ffffff",
                    borderColor: "rgba(112,120,125,0.18)",
                    borderWidth: 1,
                    padding: 12,
                    cornerRadius: 8,
                    displayColors: true,
                    callbacks: {
                        label: (ctx) => `${ctx.dataset.label}: ${Number(ctx.raw).toLocaleString("en-US")} UZS`
                    }
                }
            },
            scales: {
                y: { beginAtZero: true, grid: { color: "rgba(112,120,125,0.15)" } },
                x: { grid: { display: false } }
            }
        };
        const analytics = document.getElementById("analytics-balance-chart");
        if (analytics && !analytics.dataset.ready) {
            analytics.dataset.ready = "true";
            new Chart(analytics, {
                type: "bar",
                data: {
                    labels: ["Jan", "Feb", "Mar", "Apr"],
                    datasets: [
                        { label: "Debit", data: [820000000, 940000000, 790000000, 860000000], backgroundColor: "#0061FF", borderRadius: 4 },
                        { label: "Credit", data: [110000000, 120000000, 180000000, 160000000], backgroundColor: "#D1E4FF", borderRadius: 4 },
                        { label: "Accruals", data: [320000000, 360000000, 240000000, 300000000], backgroundColor: "#FF6B00", borderRadius: 4 },
                        { label: "Receipts", data: [410000000, 280000000, 220000000, 380000000], backgroundColor: "#00A878", borderRadius: 4 }
                    ]
                },
                options: baseOptions
            });
        }
        const consumption = document.getElementById("consumption-chart");
        if (consumption && !consumption.dataset.ready) {
            consumption.dataset.ready = "true";
            new Chart(consumption, {
                type: "bar",
                data: {
                    labels: ["Jan", "Feb", "Mar", "Apr", "May", "Jun"],
                    datasets: [
                        { label: "Water", data: [128000000, 139000000, 118000000, 126000000, 132000000, 141000000], backgroundColor: "rgba(0, 45, 166, 0.45)", borderRadius: 4 },
                        { label: "Heating", data: [91000000, 84000000, 99000000, 76000000, 54000000, 42000000], backgroundColor: "rgba(0, 92, 114, 0.25)", borderRadius: 4 }
                    ]
                },
                options: baseOptions
            });
        }
    };
    setupCharts();

    const backdrop = document.querySelector("[data-overlay-backdrop]");
    let backdropTimer = null;
    const showBackdrop = () => {
        if (!backdrop) return;
        if (backdropTimer) window.clearTimeout(backdropTimer);
        backdrop.classList.remove("hidden");
        requestAnimationFrame(() => backdrop.classList.add("is-visible"));
    };
    const hideBackdrop = () => {
        if (!backdrop) return;
        backdrop.classList.remove("is-visible");
        backdropTimer = window.setTimeout(() => backdrop.classList.add("hidden"), prefersReduced ? 0 : 180);
    };
    const closeAll = () => {
        document.querySelectorAll(".app-drawer.is-open").forEach((drawer) => {
            drawer.classList.remove("is-open");
            drawer.setAttribute("aria-hidden", "true");
        });
        document.querySelectorAll(".app-modal.is-open").forEach((modal) => {
            modal.classList.add("hidden");
            modal.classList.remove("is-open", "flex");
            modal.setAttribute("aria-hidden", "true");
        });
        hideBackdrop();
    };
    document.querySelectorAll("[data-drawer-open]").forEach((button) => {
        button.addEventListener("click", () => {
            closeAll();
            document.querySelector(".account-menu")?.classList.add("hidden");
            const drawer = document.getElementById(button.dataset.drawerOpen);
            if (!drawer) return;
            showBackdrop();
            drawer.classList.add("is-open");
            drawer.setAttribute("aria-hidden", "false");
        });
    });
    document.querySelectorAll("[data-modal-open]").forEach((button) => {
        button.addEventListener("click", () => {
            closeAll();
            const modal = document.getElementById(button.dataset.modalOpen);
            if (!modal) return;
            showBackdrop();
            modal.classList.remove("hidden");
            modal.classList.add("flex", "is-open");
            modal.setAttribute("aria-hidden", "false");
        });
    });
    document.querySelectorAll("[data-close-overlay]").forEach((button) => button.addEventListener("click", closeAll));
    backdrop?.addEventListener("click", closeAll);
    document.addEventListener("keydown", (event) => {
        if (event.key === "Escape") closeAll();
        if ((event.ctrlKey || event.metaKey) && event.key.toLowerCase() === "k") {
            event.preventDefault();
            document.getElementById("command-palette")?.classList.remove("hidden");
            document.getElementById("command-palette")?.classList.add("flex", "is-open");
            document.getElementById("command-palette")?.setAttribute("aria-hidden", "false");
            showBackdrop();
            window.setTimeout(() => document.querySelector("[data-command-input]")?.focus(), 0);
        }
    });

    document.querySelectorAll("[data-command-open]").forEach((input) => {
        input.closest("form")?.addEventListener("submit", (event) => event.preventDefault());
        input.addEventListener("focus", () => {
            document.getElementById("command-palette")?.classList.remove("hidden");
            document.getElementById("command-palette")?.classList.add("flex", "is-open");
            document.getElementById("command-palette")?.setAttribute("aria-hidden", "false");
            showBackdrop();
            window.setTimeout(() => document.querySelector("[data-command-input]")?.focus(), 0);
        });
    });
    const accountToggle = document.querySelector("[data-account-toggle]");
    const accountMenu = document.querySelector(".account-menu");
    const closeAccountMenu = () => {
        accountMenu?.classList.add("hidden");
        accountToggle?.setAttribute("aria-expanded", "false");
    };
    accountToggle?.addEventListener("click", (event) => {
        event.stopPropagation();
        const willOpen = accountMenu?.classList.contains("hidden");
        accountMenu?.classList.toggle("hidden");
        accountToggle?.setAttribute("aria-expanded", willOpen ? "true" : "false");
    });
    document.addEventListener("click", (event) => {
        if (!event.target.closest("[data-account-toggle]") && !event.target.closest(".account-menu")) {
            closeAccountMenu();
        }
    });
    accountMenu?.querySelectorAll("button").forEach((button) => button.addEventListener("click", closeAccountMenu));
    document.querySelector("[data-mark-read]")?.addEventListener("click", () => {
        document.querySelectorAll("[data-notification-list] .notification-item").forEach((item) => item.classList.add("opacity-60"));
        document.querySelector("[data-notification-dot]")?.classList.add("hidden");
    });

    document.querySelectorAll("button").forEach((button) => {
        const label = button.textContent.trim().toLowerCase();
        if (label.includes("filter") || label.includes("last 30 days")) {
            button.addEventListener("click", () => document.querySelector("[data-drawer-open='filter-drawer']")?.click());
        }
        if ((label.includes("details") || label.includes("view report") || label.includes("billing history")) && !button.matches("[data-apartment-details]")) {
            button.setAttribute("data-detail-open", "");
        }
    });
    document.querySelectorAll("[data-detail-open]:not([data-apartment-details])").forEach((button) => {
        button.addEventListener("click", () => document.querySelector("[data-drawer-open='details-drawer']")?.click());
    });

    window.HydroFlowFiltersBootstrapped = true;
})();
</script>

    window.HydroFlowBackendData = JSON.parse("{{ backend_billing_data_json|default:'{}'|escapejs }}");
</script>
