{% extends "base.html" %}
{% block title %}{{ page_title }}{% endblock %}
{% block page_body %}
<main class="ml-64 min-h-screen pt-16">
<div class="px-8 py-8">
<section class="max-w-4xl bg-surface-container-lowest rounded-2xl border border-outline-variant/10 shadow-sm p-8">
<p class="text-[11px] font-black uppercase tracking-[0.18em] text-primary" data-i18n-key="Billing">Billing</p>
<h1 class="mt-3 text-3xl font-black text-on-surface" data-i18n-key="Create Billing Period">Create Billing Period</h1>
<p class="mt-3 text-sm text-on-surface-variant max-w-2xl" data-i18n-key="Create a new расчетный период for heating and hot water calculations.">Create a new расчетный период for heating and hot water calculations.</p>
<div class="mt-8 flex flex-wrap gap-3">
<a class="inline-flex items-center gap-2 px-5 py-3 rounded-xl bg-primary text-white text-sm font-bold hover:opacity-90 transition-all" href="/admin/billing/billingperiod/add/">
<span class="material-symbols-outlined text-base">calendar_month</span>
<span data-i18n-key="Open admin form">Open admin form</span>
</a>
<a class="inline-flex items-center gap-2 px-5 py-3 rounded-xl bg-surface-container text-on-surface text-sm font-bold hover:bg-surface-container-high transition-all" href="/billing/">
<span class="material-symbols-outlined text-base">arrow_back</span>
<span data-i18n-key="Back to Billing">Back to Billing</span>
</a>
</div>
</section>
</div>
</main>
{% endblock %}
